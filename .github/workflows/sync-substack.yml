name: Sync Substack

on:
  schedule:
    - cron: "17 * * * *"   # hourly, at :17
  workflow_dispatch: {}      # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: sync-substack
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Pull Substack feed -> posts.json
        run: python3 scripts/sync_substack.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain posts.json)" ]; then
            git config user.name "substack-sync[bot]"
            git config user.email "actions@github.com"
            git add posts.json
            git commit -m "Sync Substack posts"
            git push
          else
            echo "No changes."
          fi
